name: harness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harness:
    name: harness doctor/readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check local harness surface
        run: |
          if [ ! -d .harness ]; then
            echo "No committed .harness directory; repository keeps harness runtime local-only."
            exit 0
          fi
          npm run harness:doctor
          npm run harness:readiness
