name: harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify no bypass env in CI
        run: |
          if [ -n "${AHK_ALLOW_BYPASS:-}" ]; then
            echo "AHK_ALLOW_BYPASS must not be set in CI" >&2
            exit 1
          fi
      - name: Install Node deps (if package.json present)
        run: |
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then npm i -g yarn && yarn install --frozen-lockfile
            else npm ci || npm install
            fi
          fi
      - name: Install Python deps (if pyproject.toml present)
        run: |
          if [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip
            pip install libcst import-linter ruff || true
            pip install -e '.[dev]' || pip install -e . || true
          fi
      - name: Harness readiness
        run: |
          if [ -f package.json ] && grep -q '"harness:readiness"' package.json; then
            npm run --silent harness:readiness
          elif [ -f .harness/scripts/harness-readiness.mjs ]; then
            node .harness/scripts/harness-readiness.mjs --strict
          else
            echo "Missing .harness/scripts/harness-readiness.mjs"
            exit 1
          fi
      - name: Harness PR annotations
        if: always()
        continue-on-error: true
        run: |
          if [ -f package.json ] && grep -q '"harness:pr-annotations"' package.json; then
            npm run --silent harness:pr-annotations -- --json-out=.harness/reports/pr-annotations.json
          elif [ -f .harness/scripts/pr-annotations.mjs ]; then
            node .harness/scripts/pr-annotations.mjs --github-annotations --out=.harness/reports/pr-annotations.md --sarif-out=.harness/reports/pr-annotations.sarif --json-out=.harness/reports/pr-annotations.json
          else
            echo "Missing .harness/scripts/pr-annotations.mjs"
          fi
      - name: Upload harness PR annotation artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: harness-pr-annotations
          path: |
            .harness/reports/pr-annotations.md
            .harness/reports/pr-annotations.json
            .harness/reports/pr-annotations.sarif
          if-no-files-found: ignore
      - name: Patch hygiene
        run: git diff --check
      - name: Lint
        continue-on-error: true
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run --silent lint
          elif command -v ruff >/dev/null 2>&1; then
            ruff check .
          fi
