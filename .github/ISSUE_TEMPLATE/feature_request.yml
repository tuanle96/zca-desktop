name: Feature request
description: Suggest an idea for zca-desktop
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This is a personal, **noncommercial** tool. Features that encourage bulk
        messaging, mass automation, or spam-like behavior (which raise account-ban
        risk) are out of scope and will be declined.
  - type: textarea
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why is it needed?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the behavior you'd like.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
  - type: checkboxes
    attributes:
      label: Scope check
      options:
        - label: This request does not involve bulk/automated messaging or spam-like automation.
          required: true
