# Cloudflare named-tunnel config for running cloudflared NATIVELY on the host
# (not in Docker) — routes target the host-published ports from
# apps/server/docker-compose.dev.yml. Run:
#   cloudflared tunnel --config cloudflared/zca-dev/config.local.yml run zca-dev
#
# Replace <TUNNEL_UUID> with the UUID printed by `cloudflared tunnel create zca-dev`.
tunnel: 98071e8c-71ab-4b27-a247-c3c517cd3cc5
credentials-file: /Users/tuan/.cloudflared/98071e8c-71ab-4b27-a247-c3c517cd3cc5.json

ingress:
  - hostname: zca.tuanle.dev
    service: http://127.0.0.1:37880
  - hostname: mail-zca.tuanle.dev
    service: http://127.0.0.1:37885
  - hostname: minio-zca.tuanle.dev
    service: http://127.0.0.1:37882
  - service: http_status:404
