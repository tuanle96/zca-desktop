# Cloudflare named-tunnel config for running cloudflared NATIVELY on the host
# (not in Docker). Copy to config.local.yml and fill in your own tunnel and
# hostnames. The copied config.local.yml is gitignored.
#
# Run:
#   cloudflared tunnel --config cloudflared/zca-dev/config.local.yml run zca-dev

tunnel: <TUNNEL_UUID_OR_NAME>
credentials-file: /Users/<you>/.cloudflared/<TUNNEL_UUID>.json

ingress:
  - hostname: zca.example.com
    service: http://127.0.0.1:37880
  - hostname: mail-zca.example.com
    service: http://127.0.0.1:37885
  - hostname: minio-zca.example.com
    service: http://127.0.0.1:37882
  - service: http_status:404
