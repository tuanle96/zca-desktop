services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zca
      POSTGRES_PASSWORD: zca
      POSTGRES_DB: zca_cloud
    ports:
      - "37881:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zca -d zca_cloud"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zca
      MINIO_ROOT_PASSWORD: zca-password
    ports:
      - "37882:9000"
      - "37883:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "37884:1025"
      - "37885:8025"

  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 zca zca-password &&
      mc mb --ignore-existing local/zca-cloud-dev
      "
