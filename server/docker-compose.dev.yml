services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zca
      POSTGRES_PASSWORD: zca
      POSTGRES_DB: zca_cloud
    ports:
      - "37881:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zca -d zca_cloud"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zca
      MINIO_ROOT_PASSWORD: zca-password
    ports:
      - "37882:9000"
      - "37883:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "37884:1025"
      - "37885:8025"

  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 zca zca-password &&
      mc mb --ignore-existing local/zca-cloud-dev
      "

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://zca:zca@postgres:5432/zca_cloud
      ZCA_CLOUD_BIND: 0.0.0.0:37880
      ZCA_CLOUD_PUBLIC_BASE_URL: http://127.0.0.1:37880
      # Dev convenience: the login code is returned in the API response (no email needed).
      # For a real deploy build the `runtime` target and set these to production values.
      ZCA_CLOUD_DEV_RETURN_MAGIC_TOKENS: "1"
      ZCA_CLOUD_SMTP_ADDR: mailhog:1025
      # MailHog speaks plaintext SMTP — disable TLS for the dev relay only.
      ZCA_CLOUD_SMTP_TLS: "0"
      ZCA_CLOUD_MASTER_KEY: dev-insecure-local-only-change-before-any-real-deploy
      ZCA_CLOUD_OBJECT_STORE: s3
      ZCA_CLOUD_S3_ENDPOINT: http://minio:9000
      ZCA_CLOUD_S3_ALLOW_HTTP: "1"
      ZCA_CLOUD_S3_BUCKET: zca-cloud-dev
      AWS_ACCESS_KEY_ID: zca
      AWS_SECRET_ACCESS_KEY: zca-password
    volumes:
      # Live source for hot-reload; deps + build artifacts cached in named volumes
      # so the host's macOS target/ stays separate from the Linux build.
      - ./:/app
      - server-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    ports:
      - "37880:37880"
    restart: always

volumes:
  server-target:
  cargo-registry:
  cargo-git:
