services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zca
      POSTGRES_PASSWORD: zca
      POSTGRES_DB: zca_cloud
    ports:
      - "37881:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zca -d zca_cloud"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zca
      MINIO_ROOT_PASSWORD: zca-password
    ports:
      - "37882:9000"
      - "37883:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "37884:1025"
      - "37885:8025"

  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 zca zca-password &&
      mc mb --ignore-existing local/zca-cloud-dev
      "

  server:
    build:
      # Repo root: the server path-depends on ../../crates/zca-types.
      context: ../..
      dockerfile: apps/server/Dockerfile
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://zca:zca@postgres:5432/zca_cloud
      ZCA_CLOUD_BIND: 0.0.0.0:37880
      # Override to your tunnel domain when exposing publicly, e.g.
      # ZCA_CLOUD_PUBLIC_BASE_URL=https://zca.example.com (so magic-link URLs are public).
      ZCA_CLOUD_PUBLIC_BASE_URL: ${ZCA_CLOUD_PUBLIC_BASE_URL:-http://127.0.0.1:37880}
      # Login codes are delivered via MailHog (see below) — read them at the
      # MailHog web UI on http://127.0.0.1:37885. ZCA_CLOUD_DEV_RETURN_MAGIC_TOKENS
      # (return the code in the API response) is intentionally NOT set: the server
      # refuses that flag on a non-loopback bind, and this container must bind
      # 0.0.0.0 for Docker port mapping.
      ZCA_CLOUD_SMTP_ADDR: mailhog:1025
      # MailHog speaks plaintext SMTP — disable TLS for the dev relay only.
      ZCA_CLOUD_SMTP_TLS: "0"
      # Magic-link emails open the desktop app via the zca:// deep link (ADR-0009).
      # NOTE: on macOS, custom-scheme deep links only fire for the INSTALLED .app,
      # not under `tauri dev` — use the code printed in the email during dev.
      ZCA_CLOUD_APP_LINK_SCHEME: zca
      ZCA_CLOUD_MASTER_KEY: dev-insecure-local-only-change-before-any-real-deploy
      ZCA_CLOUD_OBJECT_STORE: s3
      ZCA_CLOUD_S3_ENDPOINT: http://minio:9000
      ZCA_CLOUD_S3_ALLOW_HTTP: "1"
      ZCA_CLOUD_S3_BUCKET: zca-cloud-dev
      AWS_ACCESS_KEY_ID: zca
      AWS_SECRET_ACCESS_KEY: zca-password
    volumes:
      # Live source for hot-reload (server + its shared path-dep crate); deps +
      # build artifacts cached in named volumes so the host's macOS target/ stays
      # separate from the Linux build.
      - ./:/repo/apps/server
      - ../../crates/zca-types:/repo/crates/zca-types
      - server-target:/repo/apps/server/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    working_dir: /repo/apps/server
    ports:
      - "37880:37880"
    restart: always

  # Cloudflare tunnel — exposes the dev stack at your public dev hostnames. Opt-in via the
  # `tunnel` profile; see ../../cloudflared/zca-dev/README.md for one-time setup.
  #   ZCA_TUNNEL_UUID=<uuid> docker compose -f apps/server/docker-compose.dev.yml \
  #     --profile tunnel up -d cloudflared-zca
  cloudflared-zca:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --config /etc/cloudflared/config.yml run zca-dev
    profiles: [tunnel]
    depends_on:
      server:
        condition: service_started
    volumes:
      - ../../cloudflared/zca-dev/config.yml:/etc/cloudflared/config.yml:ro
      - ${HOME}/.cloudflared/${ZCA_TUNNEL_UUID:-missing-tunnel-uuid}.json:/etc/cloudflared/credentials.json:ro
    restart: unless-stopped

volumes:
  server-target:
  cargo-registry:
  cargo-git:
